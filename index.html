<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPipe - Skeleton Only</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            background-color: #050505;
            color: #00FF00;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 640px;
            height: 480px;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
        /* ビデオは処理に必要だが、表示はしない */
        #webcam {
            display: none;
        }
        /* キャンバスに背景色をつけて骨格だけを見せる */
        #output_canvas {
            width: 100%;
            height: 100%;
            background-color: #000;
            transform: rotateY(180deg); /* 鏡合わせにする */
        }
        .status {
            position: absolute;
            top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="status" id="status">System Initializing...</div>

    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script type="module">
        import {
            PoseLandmarker,
            FilesetResolver,
            DrawingUtils
        } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.0";

        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const statusDiv = document.getElementById("status");

        let poseLandmarker = undefined;
        let lastVideoTime = -1;

        async function init() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );
            
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task`,
                    delegate: "GPU"
                },
                runningMode: "VIDEO"
            });

            statusDiv.innerText = "Camera Accessing...";
            enableCam();
        }

        function enableCam() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
                statusDiv.innerText = "System Online";
            });
        }

        async function predictWebcam() {
            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;

            let startTimeMs = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = poseLandmarker.detectForVideo(video, startTimeMs);

                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                const drawingUtils = new DrawingUtils(canvasCtx);

                if (results.landmarks) {
                    for (const landmark of results.landmarks) {
                        // 接続線を描画（白）
                        drawingUtils.drawConnectors(landmark, PoseLandmarker.POSE_CONNECTIONS, {
                            color: "#FFFFFF",
                            lineWidth: 2
                        });
                        // 関節点を描画（緑）
                        drawingUtils.drawLandmarks(landmark, {
                            radius: 3,
                            color: "#00FF00"
                        });
                    }
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        init();
    </script>
</body>
</html>

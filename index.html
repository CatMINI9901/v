<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>8-BIT PRO SYSTEM v14.0</title>
    <script src="https://unpkg.com/tone"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        :root { --fc-red: #8c1e23; --fc-cream: #f5eedc; --fc-gold: #ffcf00; --fc-black: #111; }
        body { background: #111; color: var(--fc-black); font-family: 'DotGothic16', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .console { background: var(--fc-cream); width: 650px; border-radius: 15px; border-bottom: 10px solid #aaa; padding: 20px; box-shadow: 0 20px 60px #000; }
        .top-stripe { background: var(--fc-red); height: 40px; margin: -20px -20px 20px; border-radius: 15px 15px 0 0; display: flex; align-items: center; padding: 0 20px; color: var(--fc-gold); font-weight: bold; font-size: 0.9rem; }
        
        .main-display { background: #1a1a1a; border: 8px solid var(--fc-red); height: 200px; padding: 15px; display: flex; flex-direction: column; position: relative; }
        #drop-zone { border: 2px dashed var(--fc-gold); color: var(--fc-gold); padding: 20px; text-align: center; cursor: pointer; font-size: 0.8rem; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        
        .viz-grid { display: flex; justify-content: space-around; height: 60px; align-items: flex-end; margin-top: 10px; border-top: 1px solid #333; }
        .v-bar { width: 12%; background: var(--fc-gold); border: 1px solid #fff; height: 0%; transition: height 0.05s; }
        
        .pro-panel { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; background: #ddd; padding: 15px; border: 3px inset #fff; }
        .knob-box { text-align: center; font-size: 0.6rem; }
        input[type=range] { width: 100%; accent-color: var(--fc-red); }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .joypad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 2px; }
        .pad-btn { width: 20px; height: 20px; background: #333; border-radius: 3px; }
        
        .action-btns { display: flex; gap: 15px; }
        .round-btn { width: 50px; height: 50px; border-radius: 50%; border: 4px solid #fff; background: var(--fc-red); color: #fff; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #601215; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        .round-btn:active { transform: translateY(3px); box-shadow: none; }
        .round-btn:disabled { background: #888; box-shadow: 0 4px 0 #444; cursor: not-allowed; }

        #status-msg { font-size: 0.7rem; color: #ff007f; text-align: center; margin-top: 10px; height: 1em; }
    </style>
</head>
<body>

<div class="console">
    <div class="top-stripe">PRO MIDI MASTERING SYSTEM v14.0</div>
    
    <div class="main-display">
        <div id="drop-zone">MIDI CASSETTE SLOT<br>(Click to Insert)</div>
        <div class="viz-grid" id="viz-container">
            <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
        </div>
    </div>

    <div class="pro-panel">
        <div class="knob-box">
            BIT CRUSH
            <input type="range" id="crush-ctrl" min="1" max="8" value="4">
        </div>
        <div class="knob-box">
            WARMTH
            <input type="range" id="warm-ctrl" min="0" max="100" value="20">
        </div>
        <div class="knob-box">
            SPEED
            <input type="range" id="speed-ctrl" min="50" max="150" value="100">
        </div>
    </div>

    <div class="controls">
        <div class="joypad">
            <div class="pad-btn" style="grid-area:up"></div>
            <div class="pad-btn" style="grid-area:left"></div>
            <div class="pad-btn" style="grid-area:right"></div>
            <div class="pad-btn" style="grid-area:down"></div>
        </div>
        <div id="status-msg">AWAITING CASSETTE...</div>
        <div class="action-btns">
            <button class="round-btn" id="play-btn" disabled>START</button>
            <button class="round-btn" id="stop-btn" disabled style="background:#444">RESET</button>
        </div>
    </div>
</div>

<script>
    const bars = document.querySelectorAll('.v-bar');
    const playBtn = document.getElementById('play-btn');
    const stopBtn = document.getElementById('stop-btn');
    const dropZone = document.getElementById('drop-zone');
    const status = document.getElementById('status-msg');
    
    const crushCtrl = document.getElementById('crush-ctrl');
    const warmCtrl = document.getElementById('warm-ctrl');
    const speedCtrl = document.getElementById('speed-ctrl');

    let midiData = null;

    // --- 高機能オーディオチェーン ---
    const bitCrusher = new Tone.BitCrusher(4).toDestination();
    const dist = new Tone.Distortion(0.2).connect(bitCrusher);
    const filter = new Tone.Filter(3000, "lowpass").connect(dist);
    const masterVol = new Tone.Volume(-10).connect(filter);

    // 5チャンネル音源 (Pulse1, Pulse2, Tri, Noise, DPCM/Sub)
    const synths = [
        new Tone.PolySynth(Tone.Synth, { oscillator: { type: "pulse", width: 0.5 }, envelope: { attack: 0.001, decay: 0.1, sustain: 0.3, release: 0.02 } }).connect(masterVol),
        new Tone.PolySynth(Tone.Synth, { oscillator: { type: "pulse", width: 0.25 }, envelope: { attack: 0.001, decay: 0.1, sustain: 0.3, release: 0.02 } }).connect(masterVol),
        new Tone.PolySynth(Tone.Synth, { oscillator: { type: "triangle" }, envelope: { attack: 0.01, sustain: 1, release: 0.02 } }).connect(masterVol),
        new Tone.NoiseSynth({ envelope: { attack: 0.001, decay: 0.1, sustain: 0 } }).connect(masterVol),
        new Tone.PolySynth(Tone.Synth, { oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.1 } }).connect(masterVol) // DPCM代用
    ];

    dropZone.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.mid';
        input.onchange = e => load(e.target.files[0]);
        input.click();
    };

    async function load(file) {
        const ab = await file.arrayBuffer();
        midiData = new Midi(ab);
        status.innerText = "CASSETTE LOADED.";
        dropZone.innerHTML = `<span style="color:#fff">TRACK: ${file.name.substring(0,12)}</span>`;
        playBtn.disabled = false; stopBtn.disabled = false;
    }

    // リアルタイムコントロールの反映
    crushCtrl.oninput = (e) => bitCrusher.bits = e.target.value;
    warmCtrl.oninput = (e) => dist.distortion = e.target.value / 100;
    speedCtrl.oninput = (e) => Tone.Transport.bpm.value = 120 * (e.target.value / 100);

    playBtn.onclick = async () => {
        await Tone.start();
        Tone.Transport.stop(); Tone.Transport.cancel();
        Tone.Transport.bpm.value = 120 * (speedCtrl.value / 100);

        midiData.tracks.forEach((track, i) => {
            let role = i % 5;
            if (track.channel === 9) role = 3;

            track.notes.forEach(note => {
                Tone.Transport.schedule((time) => {
                    const v = Math.floor(note.velocity * 15) / 15;
                    if (role === 3) {
                        synths[3].triggerAttackRelease("16n", time, v);
                    } else {
                        synths[role].triggerAttackRelease(note.name, note.duration, time, v);
                    }

                    Tone.Draw.schedule(() => {
                        bars[role].style.height = (v * 100) + "%";
                        setTimeout(() => bars[role].style.height = "0%", note.duration * 1000);
                    }, time);
                }, note.time);
            });
        });

        Tone.Transport.start();
        status.innerText = "SYSTEM RUNNING...";
    };

    stopBtn.onclick = () => {
        Tone.Transport.stop();
        synths.forEach(s => s.releaseAll ? s.releaseAll() : null);
        status.innerText = "SYSTEM RESET.";
    };
</script>
</body>
</html>
